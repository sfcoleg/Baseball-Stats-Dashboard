name: Daily data refresh

on:
  schedule:
    # 13:00 UTC = 6:00am Pacific Daylight Time (UTC-7, in effect roughly
    # Mar-Nov). During Pacific Standard Time (UTC-8, winter) this runs at
    # 5:00am instead — GitHub Actions' cron has no DST awareness, so a
    # single UTC hour can't hit 6:00am Pacific year-round. Bump to "0 14"
    # if you'd rather it be exact in winter and 7am in summer.
    - cron: "0 13 * * *"
  workflow_dispatch: {}  # lets you trigger a refresh manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingest
        run: python ingest/refresh_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.db
          git diff --cached --quiet || git commit -m "Daily data refresh $(date -u +%Y-%m-%d)"
          git push
